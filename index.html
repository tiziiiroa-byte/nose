<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ara</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe5ec;
            font-family: sans-serif;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            cursor: pointer;
        }

        /* Parte trasera del sobre */
        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ff9999;
            border-radius: 10px;
            z-index: 1;
        }

        /* La carta (el papel) */
        .letter {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 270px;
            height: 170px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 5px;
            text-align: center;
            transition: transform 0.6s ease-in-out;
            z-index: 2; /* Entre la espalda y el frente */
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Parte frontal del sobre (la que tapa la carta) */
        .envelope-front {
            position: absolute;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-left: 150px solid #ffadad;
            border-right: 150px solid #ffadad;
            border-bottom: 100px solid #ffadad;
            border-radius: 10px;
            z-index: 4; /* Siempre por delante de la carta al inicio */
        }

        /* La tapa que se abre */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 110px solid #ff8080;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s ease-in-out;
            z-index: 5; /* La tapa superior */
        }

        /* Animación cuando abres */
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-140px);
            z-index: 6; /* Al subir, se pone por encima de todo */
        }

        .text {
            color: #444;
            font-size: 0.9rem;
            line-height: 1.4;
            margin: 0;
        }

        .tap-instruction {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #d63384;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="envelope-back"></div>
        
        <div class="letter">
            <h3 style="color: #d63384; margin: 0 0 5px 0;">Para: Ara 💗</h3>
            <p class="text">Te quiero mucho mi niña y que sepas que aunque estemos bien o mal siempre me vas a tener. 💗</p>
        </div>

        <div class="envelope-front"></div>
        <div class="envelope-flap"></div>

        <div class="tap-instruction">¡Toca para abrir! 💌</div>
    </div>

</body>
</html>
